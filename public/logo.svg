<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <defs>
    <linearGradient id="hex-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B9BF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B9BF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <path d="M20 10 L44 10 L56 32 L44 54 L20 54 L8 32 Z"
        fill="url(#hex-grad)" opacity="0.95"/>

  <!-- Inner hexagon border -->
  <path d="M20 10 L44 10 L56 32 L44 54 L20 54 L8 32 Z"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Network nodes inside hexagon -->
  <!-- Top node -->
  <circle cx="32" cy="20" r="3.5" fill="white"/>
  <!-- Bottom-left node -->
  <circle cx="20" cy="40" r="3.5" fill="white" opacity="0.85"/>
  <!-- Bottom-right node -->
  <circle cx="44" cy="40" r="3.5" fill="white" opacity="0.85"/>

  <!-- Connecting lines -->
  <line x1="32" y1="20" x2="20" y2="40" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="20" x2="44" y2="40" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="40" x2="44" y2="40" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="white" opacity="0.5"/>
  <line x1="32" y1="20" x2="32" y2="32" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="32" y1="32" x2="20" y2="40" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="32" y1="32" x2="44" y2="40" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- PLM text -->
  <text x="70" y="38"
        font-family="Outfit, sans-serif"
        font-weight="800"
        font-size="30"
        fill="white"
        letter-spacing="-0.5">PLM</text>

  <!-- Advisor text -->
  <text x="152" y="38"
        font-family="DM Sans, sans-serif"
        font-weight="500"
        font-size="30"
        fill="url(#text-grad)">Advisor</text>
</svg>
