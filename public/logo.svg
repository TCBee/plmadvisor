<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 70" fill="none">
  <defs>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Wireframe cube — solid visible edges -->
  <polygon points="35,5 60,18 35,31 10,18" fill="rgba(34,211,238,0.06)" stroke="url(#gc)" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="10" y1="18" x2="10" y2="46" stroke="url(#gc)" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="60" y1="18" x2="60" y2="46" stroke="url(#gc)" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="35" y1="31" x2="35" y2="58" stroke="url(#gc)" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="10" y1="46" x2="35" y2="58" stroke="url(#gc)" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="60" y1="46" x2="35" y2="58" stroke="url(#gc)" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Dashed back edges -->
  <line x1="10" y1="18" x2="35" y2="5" stroke="rgba(34,211,238,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="10" y1="46" x2="35" y2="33" stroke="rgba(34,211,238,0.15)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Wordmark -->
  <text x="74" y="43" font-family="Outfit,sans-serif" font-weight="600" font-size="22" fill="white" letter-spacing="3">PLM <tspan fill="url(#gc)" font-weight="500">Advisor</tspan></text>
</svg>
