<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" fill="none">
  <defs>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#5B9BF8"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Top face -->
  <polygon points="35,5 60,18 35,31 10,18" fill="url(#gt)"/>
  <!-- Left face -->
  <polygon points="10,18 35,31 35,58 10,45" fill="url(#gl)"/>
  <!-- Right face -->
  <polygon points="60,18 35,31 35,58 60,45" fill="url(#gr)"/>

  <!-- Edges -->
  <polygon points="35,5 60,18 35,31 10,18" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="35" y1="31" x2="35" y2="58" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="10" y1="18" x2="10" y2="45" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="60" y1="18" x2="60" y2="45" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="10" y1="45" x2="35" y2="58" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="60" y1="45" x2="35" y2="58" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- P on right face -->
  <text x="41" y="50" font-family="Outfit,sans-serif" font-weight="800" font-size="18" fill="white" opacity="0.9">P</text>

  <!-- Wordmark -->
  <text x="76" y="42" font-family="Outfit,sans-serif" font-weight="800" font-size="28" fill="white">PLM</text>
  <text x="162" y="42" font-family="DM Sans,sans-serif" font-weight="500" font-size="28" fill="url(#gr)">Advisor</text>
</svg>
