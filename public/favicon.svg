<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Wireframe cube — no filters for favicon compatibility -->
  <!-- Top face -->
  <polygon points="32,4 56,18 32,32 8,18" fill="#0e1a2e" stroke="#22D3EE" stroke-width="2.5"/>
  <!-- Left face -->
  <polygon points="8,18 32,32 32,60 8,46" fill="#071525" stroke="#22D3EE" stroke-width="2"/>
  <!-- Right face -->
  <polygon points="56,18 32,32 32,60 56,46" fill="#0a1c30" stroke="#38BDF8" stroke-width="2"/>
  <!-- Dashed back edges -->
  <line x1="8" y1="18" x2="32" y2="4"  stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="8" y1="46" x2="32" y2="32" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.3"/>
</svg>
