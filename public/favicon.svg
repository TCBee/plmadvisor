<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#5B9BF8"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Top face -->
  <polygon points="32,4 56,18 32,32 8,18" fill="url(#gt)"/>
  <!-- Left face -->
  <polygon points="8,18 32,32 32,60 8,46" fill="url(#gl)"/>
  <!-- Right face -->
  <polygon points="56,18 32,32 32,60 56,46" fill="url(#gr)"/>

  <!-- Edges -->
  <polygon points="32,4 56,18 32,32 8,18" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="32" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="8"  y1="18" x2="8"  y2="46" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="56" y1="18" x2="56" y2="46" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="8"  y1="46" x2="32" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="56" y1="46" x2="32" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- P on right face -->
  <text x="36" y="54" font-family="Outfit,sans-serif" font-weight="800" font-size="20" fill="white" opacity="0.9">P</text>
</svg>
