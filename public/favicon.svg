<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Wireframe cube -->
  <polygon points="32,4 56,18 32,32 8,18" fill="rgba(34,211,238,0.08)" stroke="url(#gt)" stroke-width="2" filter="url(#glow)"/>
  <line x1="8"  y1="18" x2="8"  y2="46" stroke="url(#gt)" stroke-width="2" filter="url(#glow)"/>
  <line x1="56" y1="18" x2="56" y2="46" stroke="url(#gt)" stroke-width="2" filter="url(#glow)"/>
  <line x1="32" y1="32" x2="32" y2="60" stroke="url(#gt)" stroke-width="2" filter="url(#glow)"/>
  <line x1="8"  y1="46" x2="32" y2="60" stroke="url(#gt)" stroke-width="2" filter="url(#glow)"/>
  <line x1="56" y1="46" x2="32" y2="60" stroke="url(#gt)" stroke-width="2" filter="url(#glow)"/>
  <!-- Dashed back edges -->
  <line x1="8" y1="18" x2="32" y2="4"  stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="8" y1="46" x2="32" y2="32" stroke="rgba(34,211,238,0.2)"  stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
