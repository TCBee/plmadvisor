        "@type": "PostalAddress",
        "streetAddress": "Humboldtstraße 12",
        "addressLocality": "Offenbach am Main",
        "postalCode": "63071",
        "addressCountry": "DE"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "50.0993",
        "longitude": "8.7604"
      },
      "email": "plmadvisor@gmail.com",
      "sameAs": [
        "https://youtube.com/@nxcoder"
      ],

        "@type": "OpeningHoursSpecification",

      },
      "hasOfferCatalog": {

    }
